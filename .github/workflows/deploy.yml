name: Deploy Fullstack App

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: SSH into EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}

        script: |

          cd /home/ubuntu

          if [ ! -d "app" ]; then
            git clone https://github.com/Jyothiting/ghactions-docker-postgresql.git app
          fi

          cd app

          git pull origin main

          docker-compose down

          docker-compose up -d --build
